<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ArchStudio</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Login Section -->
    <div id="login-section" class="admin-container">
        <div class="admin-card">
            <h2>Admin Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
                <p id="login-error" class="error-msg"></p>
            </form>
            <div class="demo-credentials">
                <p><strong>Setup Required:</strong></p>
                <p>Please configure your Firebase credentials in <code>js/firebase-config.js</code> to use the Admin Panel.</p>
            </div>
        </div>
    </div>

    <!-- Dashboard Section (Hidden by default) -->
    <div id="dashboard-section" class="admin-dashboard hidden">
        <header class="admin-header">
            <h2>ArchStudio Admin</h2>
            <div class="admin-actions">
                <a href="/" class="btn btn-outline">View Site</a>
                <button id="logout-btn" class="btn">Logout</button>
            </div>
        </header>

        <div class="admin-content">
            <!-- Manage Projects -->
            <div class="admin-panel">
                <h3>Add New Project</h3>
                <form id="add-project-form" class="admin-form">
                    <input type="text" id="project-title" placeholder="Project Title" required>
                    <select id="project-category" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Residential">Residential</option>
                        <option value="Commercial">Commercial</option>
                    </select>
                    <textarea id="project-desc" placeholder="Project Description" rows="3" required></textarea>
                    <input type="file" id="project-image" accept="image/*" required>
                    <button type="submit" class="btn" id="submit-project-btn">Add Project</button>
                    <p id="project-status" class="status-msg"></p>
                </form>

                <h3 class="mt-2">Existing Projects</h3>
                <div id="admin-projects-list" class="admin-list">
                    <!-- Projects list injected here -->
                </div>
            </div>

            <!-- Manage Team -->
            <div class="admin-panel">
                <h3>Add Team Member</h3>
                <form id="add-team-form" class="admin-form">
                    <input type="text" id="team-name" placeholder="Name" required>
                    <input type="text" id="team-role" placeholder="Role (e.g. Lead Architect)" required>
                    <textarea id="team-bio" placeholder="Short Bio" rows="2" required></textarea>
                    <input type="file" id="team-photo" accept="image/*" required>
                    <button type="submit" class="btn" id="submit-team-btn">Add Member</button>
                    <p id="team-status" class="status-msg"></p>
                </form>

                <h3 class="mt-2">Existing Team</h3>
                <div id="admin-team-list" class="admin-list">
                    <!-- Team list injected here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/admin.js"></script>
</body>
</html>
